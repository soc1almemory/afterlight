<!DOCTYPE html>
<html>
<head>
  	<meta charset="utf-8">
  	<meta name="viewport" content="initial-scale=1, width=device-width">
  	
  	<link rel="stylesheet" href="../style.css" />
  	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@500;700&display=swap" />
  	
  	
  	
</head>
<body class="page-popup-edit-task">
  	
  	<div class="popup-edit-task">
    		<div class="edit-task-container">
      			<div class="edit-title-and-desc-container">
        				<div class="add-title-text">Подготовить доклад</div>
        				<div class="add-desc-text">Завершить раздел “Введение”</div>
      			</div>
      			<div class="edit-task-deadline-container">
        				<div class="deadline-container">
          					<b class="date">17.10</b>
        				</div>
        				<div class="deadline-container2">
          					<b class="date">12:00</b>
        				</div>
      			</div>
      			<div class="separator">
      			</div>
      			<div class="edit-config-group">
        				<div class="add-task-config-container">
          					<img class="popup-term-icon" src="../assets/popup-term-icon.svg" alt="">
          					
          					<div class="add-config-text">Срок</div>
          					<div class="deadline-container3">
            						<b class="date">17.10</b>
          					</div>
        				</div>
        				<div class="add-task-config-container">
          					<div class="prio-1">
          					</div>
          					<div class="add-config-text">Приоритет</div>
        				</div>
        				<div class="add-task-config-container">
          					<img class="popup-reminders-icon" src="../assets/popup-reminders-icon.svg" alt="">
          					
          					<div class="add-config-text3">Напоминания</div>
          					<div class="remind-container">
            						<b class="date">Включены</b>
          					</div>
          					<img class="add-edit-alarm-status-icon" src="../assets/popup-reminders-icon.svg" alt="">
          					
        				</div>
      			</div>
      			<div class="separator">
      			</div>
      			<div class="edit-task-category-list-contai">
        				<div class="add-config-text">Категория:</div>
        				<div class="add-task-category-list">
          					<div class="add-edit-icon-container">
            						<div class="hashtag-text-add-edit">#</div>
            						<img class="incoming-icon" src="../assets/incoming-icon.svg" alt="">
            						
          					</div>
          					<div class="add-config-text">Учёба</div>
          					<img class="drop-down-icon" src="../assets/drop-down-icon.svg" alt="">
          					
        				</div>
      			</div>
      			<div class="edit-task-buttons-container">
        				<div class="icon-container">
          					<img class="delete-icon" src="../assets/delete-icon.svg" alt="">
          					
        				</div>
        				<div class="add-task-button-cancel">
          					<div class="add-config-text">Отмена</div>
        				</div>
        				<div class="add-task-button-complete">
          					<div class="add-config-text">Изменить задачу</div>
        				</div>
      			</div>
    		</div>
  	</div>
  	
  	
  	
  	
</body>
</html>
