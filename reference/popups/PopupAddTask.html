<!DOCTYPE html>
<html>
<head>
  	<meta charset="utf-8">
  	<meta name="viewport" content="initial-scale=1, width=device-width">
  	
  	<link rel="stylesheet" href="../style.css" />
  	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@500;700&display=swap" />
  	
  	
  	
</head>
<body class="page-popup-add-task">
  	
  	<div class="popup-add-task">
    		<div class="add-task-container">
      			<div class="add-title-and-desc-container">
        				<div class="add-title-text">Название задачи</div>
        				<div class="add-desc-text">Описание</div>
      			</div>
      			<div class="add-task-deadline-container">
        				<div class="deadline-container">
          					<b class="date">17.10</b>
        				</div>
        				<div class="deadline-container">
          					<b class="date">12:00</b>
        				</div>
      			</div>
      			<div class="separator">
      			</div>
      			<div class="add-config-group">
        				<div class="add-task-config-container">
          					<img class="popup-term-icon" src="../../assets/popup-term-icon.svg" alt="">
          					
          					<div class="add-config-text">Срок</div>
        				</div>
        				<div class="add-task-config-container">
          					<div class="prio-1">
          					</div>
          					<div class="add-config-text">Приоритет</div>
        				</div>
        				<div class="add-task-config-container">
          					<img class="popup-reminders-icon" src="../../assets/popup-reminders-icon.svg" alt="">
          					
          					<div class="add-config-text">Напоминания</div>
        				</div>
      			</div>
      			<div class="separator">
      			</div>
      			<div class="add-task-category-list-contain">
        				<div class="add-config-text">Категория:</div>
        				<div class="add-task-category-list">
          					<img class="add-edit-icon-container" src="../../assets/add-edit-icon-container.svg" alt="">
          					
          					<div class="add-config-text">Входящие</div>
          					<img class="drop-down-icon" src="../../assets/drop-down-icon.svg" alt="">
          					
        				</div>
      			</div>
      			<div class="add-task-buttons-container">
        				<div class="add-task-button-cancel">
          					<div class="add-config-text">Отмена</div>
        				</div>
        				<div class="add-task-button-complete">
          					<div class="add-config-text">Добавить задачу</div>
        				</div>
      			</div>
    		</div>
  	</div>
  	
  	
  	
  	
</body>
</html>
